name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string

jobs:
  test:
    name: Test (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1-mesa libgl1-mesa-glx libxkbcommon-x11-0
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Run tests
        run: python3 -m pytest tests/ -v

  build-windows:
    name: Build Windows .exe
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller
      - name: Build .exe
        run: pyinstaller --clean Radiography.spec
      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: Radiography-Windows-x64
          path: dist/Radiography.exe
          if-no-files-found: error

  build-macos:
    name: Build macOS .dmg
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller dmgbuild
      - name: Build .app bundle
        run: pyinstaller --clean Radiography.spec
      - name: Build .dmg
        run: dmgbuild -s dmg_settings.py "Radiography 1.0.0" dist/Radiography-${{ github.ref_name }}.dmg
      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: Radiography-macOS-ARM64
          path: dist/Radiography-*.dmg
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Radiography-Windows-x64
          path: release-artifacts
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: Radiography-macOS-ARM64
          path: release-artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Radiography ${{ github.ref_name }}
          body: |
            Radiography RT Exposure Calculator

            ## Installation
            - **Windows**: Download `Radiography.exe`, run it directly
            - **macOS**: Download `Radiography-*.dmg`, open and drag to Applications
          files: release-artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
